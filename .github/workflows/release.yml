name: Build and Release EXE

on:
  push:
    tags:
      - 'v*' # Сработает на v1.0.0, v2.1.3 и т.д.

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # WiX Toolset v3 уже предустановлен на windows-latest в GitHub Actions,
      # нам нужно только убедиться, что он в PATH (обычно это так).

      - name: Build Fat JAR with Maven
        run: mvn clean package -DskipTests

      - name: Prepare Version String
        id: prep_version
        shell: bash
        run: |
          # Убираем 'v' из тега (v1.2.3 -> 1.2.3), так как jpackage для Windows 
          # принимает только цифры в --app-version
          VERSION=${GITHUB_REF_NAME#v}
          echo "clean_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Run jpackage (Java 21)
        run: |
          jpackage `
            --type exe `
            --dest dist `
            --name "FinstoreConverter" `
            --input target/ `
            --main-jar FinstoreToSnowballConverter-1.0-SNAPSHOT.jar `
            --main-class com.converter.FinstoreConverterApp `
            --win-dir-chooser `
            --win-shortcut `
            --win-menu `
            --icon src/main/resources/icons/app_icon.ico `
            --vendor "Bastion01" `
            --app-version ${{ steps.prep_version.outputs.clean_version }} `
            --java-options "-XX:+UseG1GC"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.exe
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
