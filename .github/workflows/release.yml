name: Build and Release EXE

on:
  push:
    tags:
      - 'v*' # Сработает на v1.0.0, v2.1.3 и т.д.
  workflow_dispatch: # Позволяет нажать кнопку "Run workflow" на сайте GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # WiX Toolset v3 уже предустановлен на windows-latest в GitHub Actions,
      # нам нужно только убедиться, что он в PATH (обычно это так).

      - name: Build Fat JAR with Maven
        run: mvn clean package -DskipTests

      - name: Get JAR Name and Prepare Deploy Folder
        id: jar_info
        shell: pwsh
        run: |
          # Автоматически находим созданный fat-jar в папке target
          $fullPath = Get-ChildItem -Path target/*.jar | Select-Object -ExpandProperty Name -First 1
          echo "JAR_NAME=$fullPath" >> $env:GITHUB_ENV

          # Создаем чистую папку для упаковки
          mkdir target/deploy
          copy "target/$fullPath" "target/deploy/"

      - name: Prepare Version
        id: prep_version
        shell: bash
        run: |
          # Убираем 'v' из тега (v1.2.3 -> 1.2.3), так как jpackage для Windows 
          # принимает только цифры в --app-version
          VERSION=${GITHUB_REF_NAME#v}
          echo "clean_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build EXE (Lite - without browsers)
        run: |
          jpackage `
            --type exe `
            --dest dist/lite `
            --name "FinstoreConverter-${{ steps.prep_version.outputs.clean_version }}-lite" `
            --input target/deploy `
            --main-jar ${{ env.JAR_NAME }} `
            --main-class com.converter.Launcher `
            --win-dir-chooser --win-shortcut --win-menu `
            --icon src/main/resources/icons/app_icon.ico `
            --vendor "Bastion01" `
            --app-version ${{ steps.prep_version.outputs.clean_version }} `
            --java-options "-XX:+UseG1GC"
        shell: pwsh

      - name: Install Playwright Browsers
        shell: cmd
        run: |
          set "PLAYWRIGHT_BROWSERS_PATH=target\deploy\browsers"
          mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install chromium"

      - name: Build EXE (Full - with browsers)
        run: |
          jpackage `
            --type exe `
            --dest dist/full `
            --name "FinstoreConverter-${{ steps.prep_version.outputs.clean_version }}" `
            --input target/deploy `
            --main-jar ${{ env.JAR_NAME }} `
            --main-class com.converter.Launcher `
            --win-dir-chooser --win-shortcut --win-menu `
            --icon src/main/resources/icons/app_icon.ico `
            --vendor "Bastion01" `
            --app-version ${{ steps.prep_version.outputs.clean_version }} `
            --java-options "-XX:+UseG1GC"
        shell: pwsh

      - name: Generate Changelog
        id: github_release_notes
        uses: mikepenz/release-changelog-builder-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Release Notes
        shell: bash
        run: |
          VERSION=${{ steps.prep_version.outputs.clean_version }}
          # 1. Берем ваш шаблон и вставляем версию
          sed "s/{{VERSION}}/$VERSION/g" .github/release-template.md > release_notes_final.md
          
          # 2. Добавляем в конец сгенерированный список изменений от GitHub
          # (Или вставляем вместо комментария-заглушки)
          echo "${{ steps.github_release_notes.outputs.changelog }}" >> release_notes_final.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes_final.md  # Используем созданный файл как описание
          files: |
            dist/lite/*.exe
            dist/full/*.exe
          draft: true
          prerelease: false
          generate_release_notes: false # Отключаем авто-генерацию, так как у нас свой текст
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
